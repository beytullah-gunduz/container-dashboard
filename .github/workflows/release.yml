name: Release

# Tag-driven release flow.
#
# To cut a release, push a semver tag prefixed with "v":
#   git tag -a v1.0.0 -m "v1.0.0"
#   git push origin v1.0.0
#
# The tag is the single source of truth for the version. The version is
# stripped of its leading "v" and passed to Gradle via -Papp.version, which
# overrides the local dev placeholder in gradle.properties. Tags containing
# a "-" (e.g. v1.0.0-beta.1) are automatically published as pre-releases.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Use bash on every runner (including windows-latest, which defaults to
# PowerShell). PowerShell mangles `-Papp.version=...` because its argument
# parser splits on the dot, sending `.version=1.0.0` to Gradle as a task
# name. Bash on Windows uses git-bash and parses identically to macOS/Linux.
defaults:
  run:
    shell: bash

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            task: packageReleaseDmg
            artifact-name: container-dashboard-macos
            artifact-glob: composeApp/build/compose/binaries/main-release/dmg/*.dmg
          - os: ubuntu-latest
            task: packageReleaseDeb
            artifact-name: container-dashboard-linux
            artifact-glob: composeApp/build/compose/binaries/main-release/deb/*.deb
          - os: windows-latest
            task: packageReleaseMsi
            artifact-name: container-dashboard-windows
            artifact-glob: composeApp/build/compose/binaries/main-release/msi/*.msi

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Verify formatting
        run: ./gradlew spotlessCheck

      - name: Build installer
        run: ./gradlew :composeApp:${{ matrix.task }} -Papp.version=${{ steps.version.outputs.version }}

      - name: Generate SHA256 checksum
        # `sha256sum` ships with coreutils (Linux + git-bash on Windows) but
        # is missing on macOS by default. `shasum -a 256` ships with macOS
        # by default but is not guaranteed elsewhere. Pick whichever is
        # present — both produce the same `<hash>  <filename>` format.
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            HASH="sha256sum"
          else
            HASH="shasum -a 256"
          fi
          for f in ${{ matrix.artifact-glob }}; do
            $HASH "$f" > "$f.sha256"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            ${{ matrix.artifact-glob }}
            ${{ matrix.artifact-glob }}.sha256
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          generate_release_notes: true
          files: artifacts/**
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-') }}
