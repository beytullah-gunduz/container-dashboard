name: Release

# Tag-driven release flow.
#
# To cut a release, push a semver tag prefixed with "v":
#   git tag -a v1.0.0 -m "v1.0.0"
#   git push origin v1.0.0
#
# The tag is the single source of truth for the version. The version is
# stripped of its leading "v" and passed to Gradle via -Papp.version, which
# overrides the local dev placeholder in gradle.properties. Tags containing
# a "-" (e.g. v1.0.0-beta.1) are automatically published as pre-releases.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            task: packageReleaseDmg
            artifact-name: container-dashboard-macos
            artifact-glob: composeApp/build/compose/binaries/main-release/dmg/*.dmg
          - os: ubuntu-latest
            task: packageReleaseDeb
            artifact-name: container-dashboard-linux
            artifact-glob: composeApp/build/compose/binaries/main-release/deb/*.deb
          - os: windows-latest
            task: packageReleaseMsi
            artifact-name: container-dashboard-windows
            artifact-glob: composeApp/build/compose/binaries/main-release/msi/*.msi

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Verify formatting
        run: ./gradlew spotlessCheck

      - name: Build installer
        run: ./gradlew :composeApp:${{ matrix.task }} -Papp.version=${{ steps.version.outputs.version }}

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          for f in ${{ matrix.artifact-glob }}; do
            shasum -a 256 "$f" > "$f.sha256"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            ${{ matrix.artifact-glob }}
            ${{ matrix.artifact-glob }}.sha256
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-') }}
