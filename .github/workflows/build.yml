name: Build and Test

# Per-push CI smoke test: lint, compile, run tests. Single Linux runner —
# packaging across macOS/Linux/Windows is exercised by .github/workflows/
# release.yml on every tag push, so there's no need to repeat it here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify formatting
        run: ./gradlew spotlessCheck

      - name: Compile
        run: ./gradlew :composeApp:compileKotlinDesktop

      - name: Run tests
        run: ./gradlew :composeApp:desktopTest
