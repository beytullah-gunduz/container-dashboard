name: Build and Test

# Per-push CI smoke test: lint, compile, run tests. Single Linux runner —
# packaging across macOS/Linux/Windows is exercised by .github/workflows/
# release.yml on every tag push, so there's no need to repeat it here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0

      - name: Verify formatting
        run: ./gradlew spotlessCheck

      - name: Compile
        run: ./gradlew :composeApp:compileKotlinDesktop

      - name: Run tests
        run: ./gradlew :composeApp:desktopTest
